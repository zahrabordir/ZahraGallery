<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Galeri Produk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial;background:#f2f2f2}
header{
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;padding:50px 20px;text-align:center
}
.container{max-width:1200px;margin:auto;padding:30px 15px}
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px
}
.card{
  background:white;border-radius:12px;
  overflow:hidden;box-shadow:0 3px 8px rgba(0,0,0,.2);
  text-align:center
}
.card img{
  width:100%;height:230px;object-fit:cover;cursor:pointer
}
.subgaleri-link{
  display:block;margin:10px 0;
  color:#2575fc;font-weight:bold;text-decoration:none
}

/* SUB GALERI */
.subgaleri{text-align:center;margin-top:60px}
.subgaleri img{
  width:320px;max-width:90%;
  border-radius:12px;cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,.3)
}

/* MODAL */
#imgModal{
  display:none;position:fixed;z-index:999;
  left:0;top:0;width:100%;height:100%;
  background:rgba(0,0,0,.85);
  justify-content:center;align-items:center;
}
#modalContent{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
#modalImg{
  max-width:90vw;
  max-height:80vh;
  border-radius:10px;
  opacity:0;
  transition:opacity .4s ease-in-out, transform .2s;
}
#modalImg.show{opacity:1}

/* PREV NEXT */
.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#ffcc00;
  border:none;
  font-size:30px;
  padding:10px 15px;
  cursor:pointer;
  border-radius:50%;
  opacity:0.2;
  transition:opacity .2s;
}
.nav-btn:active{opacity:0.8}
#prevBtn{left:-60px}
#nextBtn{right:-60px}

/* CLOSE */
.close{
  position:absolute;
  top:-15px;
  right:-15px;
  width:28px;
  height:28px;
  background:black;
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.5);
}

/* INDIKATOR */
#indicator{
  position:absolute;
  bottom:-40px;
  background:rgba(0,0,0,.6);
  color:white;
  padding:6px 14px;
  border-radius:20px;
  font-size:14px;
}
</style>
</head>

<body>

<header>
<h1>Selempang Wisuda Custom</h1>
<p>Galeri Motif Bordir</p>
</header>

<div class="container">

<div class="gallery">
  <div class="card">
    <img src="images/Zahra Frame-1.jpg">
    <h3>Batik Daun</h3>
    <a href="#galeri1" class="subgaleri-link">Lihat Galeri</a>
  </div>
  <div class="card">
    <img src="images/Zahra Frame-2.jpg">
    <h3>Batik Flora</h3>
    <a href="#galeri2" class="subgaleri-link">Lihat Galeri</a>
  </div>
  <div class="card">
    <img src="images/Zahra Frame-3.jpg">
    <h3>Batik Kait</h3>
    <a href="#galeri3" class="subgaleri-link">Lihat Galeri</a>
  </div>
  <div class="card">
    <img src="images/Zahra Frame-4.jpg">
    <h3>Batik Klasik</h3>
    <a href="#galeri4" class="subgaleri-link">Lihat Galeri</a>
  </div>
  <div class="card">
    <img src="images/Zahra Frame-5.jpg">
    <h3>Batik Serat</h3>
    <a href="#galeri5" class="subgaleri-link">Lihat Galeri</a>
  </div>
  <div class="card">
    <img src="images/Zahra Frame-6.jpg">
    <h3>Batik Simpul</h3>
    <a href="#galeri6" class="subgaleri-link">Lihat Galeri</a>
  </div>
</div>

<div id="galeri1" class="subgaleri">
<h2>Batik Daun</h2>
<img src="images/Batik Daun/Batik Daun 1.webp" onclick="openGallery(1,0)">
</div>

<div id="galeri2" class="subgaleri">
<h2>Batik Flora</h2>
<img src="images/Batik Flora/Batik Flora 1.webp" onclick="openGallery(2,0)">
</div>

<div id="galeri3" class="subgaleri">
<h2>Batik Kait</h2>
<img src="images/Batik Kait/Batik Kait 1.webp" onclick="openGallery(3,0)">
</div>

<div id="galeri4" class="subgaleri">
<h2>Batik Klasik</h2>
<img src="images/Batik Klasik/Batik Klasik 1.webp" onclick="openGallery(4,0)">
</div>

<div id="galeri5" class="subgaleri">
<h2>Batik Serat</h2>
<img src="images/Batik Serat/Batik Serat 1.webp" onclick="openGallery(5,0)">
</div>

<div id="galeri6" class="subgaleri">
<h2>Batik Simpul</h2>
<img src="images/Batik Simpul/Batik Simpul 1.webp" onclick="openGallery(6,0)">
</div>

</div>

<!-- MODAL -->
<div id="imgModal">
  <div id="modalContent">
    <button class="nav-btn" id="prevBtn" onclick="prev()">❮</button>
    <img id="modalImg">
    <button class="nav-btn" id="nextBtn" onclick="next()">❯</button>
    <div class="close" onclick="closeImg()">✕</div>
    <div id="indicator">1 / 3</div>
  </div>
</div>

<script>
let galleries = {
  1:["images/Batik Daun/Batik Daun 1.webp","images/Batik Daun/Batik Daun 2.webp","images/Batik Daun/Batik Daun 3.webp"],
  2:["images/Batik Flora/Batik Flora 1.webp","images/Batik Flora/Batik Flora 2.webp","images/Batik Flora/Batik Flora 3.webp"],
  3:["images/Batik Kait/Batik Kait 1.webp","images/Batik Kait/Batik Kait 2.webp","images/Batik Kait/Batik Kait 3.webp"],
  4:["images/Batik Klasik/Batik Klasik 1.webp","images/Batik Klasik/Batik Klasik 2.webp","images/Batik Klasik/Batik Klasik 3.webp"],
  5:["images/Batik Serat/Batik Serat 1.webp","images/Batik Serat/Batik Serat 2.webp","images/Batik Serat/Batik Serat 3.webp"],
  6:["images/Batik Simpul/Batik Simpul 1.webp","images/Batik Simpul/Batik Simpul 2.webp","images/Batik Simpul/Batik Simpul 3.webp"]
};

let currentGallery = 1;
let currentIndex = 0;
let startX = 0;
let scale = 1;
let startDist = 0;

function updateIndicator(){
  document.getElementById("indicator").innerText =
    (currentIndex+1)+" / "+galleries[currentGallery].length;
}

function showImage(){
  let img = document.getElementById("modalImg");
  img.classList.remove("show");
  img.style.transform="scale(1)";
  scale = 1;
  setTimeout(()=>{
    img.src = galleries[currentGallery][currentIndex];
    img.onload = ()=>{
      img.classList.add("show");
      updateIndicator();
    };
  },150);
}

function openGallery(g,i){
  currentGallery = g;
  currentIndex = i;
  document.getElementById("imgModal").style.display="flex";
  showImage();
}

function next(){
  currentIndex++;
  if(currentIndex >= galleries[currentGallery].length) currentIndex = 0;
  showImage();
}
function prev(){
  currentIndex--;
  if(currentIndex < 0) currentIndex = galleries[currentGallery].length-1;
  showImage();
}
function closeImg(){
  document.getElementById("imgModal").style.display="none";
}

/* SWIPE */
const modal = document.getElementById("imgModal");
modal.addEventListener("touchstart", e=>{
  if(e.touches.length==1){
    startX = e.touches[0].clientX;
  }
  if(e.touches.length==2){
    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;
    startDist = Math.sqrt(dx*dx + dy*dy);
  }
});

modal.addEventListener("touchend", e=>{
  if(startX && e.changedTouches.length==1){
    let endX = e.changedTouches[0].clientX;
    if(startX - endX > 50) next();
    if(endX - startX > 50) prev();
  }
});

/* PINCH ZOOM */
modal.addEventListener("touchmove", e=>{
  if(e.touches.length==2){
    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;
    let dist = Math.sqrt(dx*dx + dy*dy);
    scale = dist / startDist;
    if(scale < 1) scale = 1;
    if(scale > 3) scale = 3;
    document.getElementById("modalImg").style.transform =
      "scale("+scale+")";
  }
});
</script>

</body>
</html>
