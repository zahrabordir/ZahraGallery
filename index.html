<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Selempang Wisuda</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.container{max-width:1100px;margin:auto;padding:20px;background:#fff;display:flex;gap:20px;flex-wrap:wrap}
.left,.right,.model-wrapper{width:50%}

/* MOBILE */
@media(max-width:768px){
  .container{flex-direction:column}
  .left,.right,.model-wrapper{width:100%}

  .left{order:1;}         /* gambar utama */
  .right{order:2;}        /* judul + galeri */
  .model-wrapper{order:3;}/* model paling bawah */
}

/* MAIN IMAGE */
.main-img img{width:100%;border-radius:8px;cursor:zoom-in}

/* MODEL */
.model-options{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
  gap:8px;margin-top:10px
}
.model-options img{
  width:100%;cursor:pointer;
  border:2px solid transparent;
  border-radius:6px
}
.model-options img.active{border-color:#ff5722}

/* BATIK */
.color-options button{
  padding:8px 14px;margin:4px;
  border:1px solid #ccc;
  background:#fff;cursor:pointer
}
.color-options button.active{
  border-color:#ff5722;
  background:#ffe7de
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;margin-top:15px
}
.gallery img{
  width:100%;
  border-radius:6px;
  cursor:pointer
}

/* LIGHTBOX */
#lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  justify-content:center;
  align-items:center;
  z-index:999
}
#lightbox img{max-width:90%;max-height:90%}
.closeBtn{
  position:absolute;top:15px;right:15px;
  width:26px;height:26px;
  background:black;color:white;
  border-radius:50%;
  text-align:center;line-height:26px;
  cursor:pointer;font-size:14px
}
.navBtn{
  position:absolute;top:50%;
  transform:translateY(-50%);
  font-size:40px;color:white;
  cursor:pointer;opacity:.2
}
.navBtn:hover{opacity:.8}
#prev{left:15px}
#next{right:15px}
#indicator{position:absolute;bottom:20px;color:white}
</style>
</head>
<body>

<div class="container">

<!-- GAMBAR UTAMA -->
<div class="left">
  <div class="main-img">
    <img id="mainImage" src="images/Model1.jpg" onclick="openLightbox()">
  </div>
</div>

<!-- JUDUL + GALERI -->
<div class="right">
  <h1>SELEMPANG WISUDA LEHER MOTIF BATIK DAUN</h1>

  <h3>Galeri</h3>
  <div class="color-options">
    <button class="active" onclick="loadGallery('Batik Daun',this)">Batik Daun</button>
    <button onclick="loadGallery('Batik Flora',this)">Batik Flora</button>
    <button onclick="loadGallery('Batik Kait',this)">Batik Kait</button>
    <button onclick="loadGallery('Batik Klasik',this)">Batik Klasik</button>
    <button onclick="loadGallery('Batik Polos',this)">Batik Polos</button>
    <button onclick="loadGallery('Batik Serat',this)">Batik Serat</button>
    <button onclick="loadGallery('Batik Simpul',this)">Batik Simpul</button>
  </div>

  <div class="gallery" id="gallery"></div>
</div>

<!-- MODEL -->
<div class="model-wrapper">
  <h3>Model</h3>
  <div class="model-options">
    <img src="images/Model1.jpg" loading="lazy" onclick="selectModel(this)" class="active">
    <img src="images/Model2.jpg" loading="lazy" onclick="selectModel(this)">
    <img src="images/Model3.jpg" loading="lazy" onclick="selectModel(this)">
    <img src="images/Model4.jpg" loading="lazy" onclick="selectModel(this)">
    <img src="images/Model5.jpg" loading="lazy" onclick="selectModel(this)">
    <img src="images/Model6.jpg" loading="lazy" onclick="selectModel(this)">
    <img src="images/Model7.jpg" loading="lazy" onclick="selectModel(this)">
    <img src="images/Model8.jpg" loading="lazy" onclick="selectModel(this)">
    <img src="images/Model9.jpg" loading="lazy" onclick="selectModel(this)">
    <img src="images/Model PPG1.jpg" loading="lazy" onclick="selectModel(this)">
    <img src="images/Model PPG2.jpg" loading="lazy" onclick="selectModel(this)">
    <img src="images/Model PPG3.jpg" loading="lazy" onclick="selectModel(this)">
  </div>
</div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox">
<div class="closeBtn" onclick="closeLightbox()">✕</div>
<div id="prev" class="navBtn" onclick="prevImg()">❮</div>
<img id="lightImg">
<div id="next" class="navBtn" onclick="nextImg()">❯</div>
<div id="indicator"></div>
</div>

<script>
let currentImages=[];
let currentIndex=0;

function selectModel(el){
document.querySelectorAll(".model-options img").forEach(i=>i.classList.remove("active"));
el.classList.add("active");
currentImages=[el.src];
currentIndex=0;
document.getElementById("mainImage").src=el.src;
}

/* GALERI AUTO */
function loadGallery(folder,btn){
document.querySelectorAll(".color-options button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

const gallery=document.getElementById("gallery");
gallery.innerHTML="";
currentImages=[];

let i=1, miss=0;
const maxMiss=5;

function tryLoad(){
let src=`images/${folder}/${folder} ${i}.webp`;
let img=new Image();
img.src=src;

img.onload=()=>{
  miss=0;
  currentImages.push(src);
  let thumb=document.createElement("img");
  thumb.src=src;
  thumb.loading="lazy";
  thumb.onclick=()=>{
    currentIndex=currentImages.indexOf(src);
    document.getElementById("mainImage").src=src;
  };
  gallery.appendChild(thumb);
  i++; tryLoad();
};

img.onerror=()=>{
  miss++; i++;
  if(miss<maxMiss) tryLoad();
};
}
tryLoad();
}

/* LIGHTBOX */
function openLightbox(){
if(currentImages.length===0){
currentImages=[document.getElementById("mainImage").src];
currentIndex=0;
}
document.getElementById("lightbox").style.display="flex";
updateLightbox();
}
function closeLightbox(){
document.getElementById("lightbox").style.display="none";
}
function updateLightbox(){
document.getElementById("lightImg").src=currentImages[currentIndex];
document.getElementById("indicator").innerText=`${currentIndex+1} / ${currentImages.length}`;
}
function nextImg(){
currentIndex=(currentIndex+1)%currentImages.length;
updateLightbox();
}
function prevImg(){
currentIndex=(currentIndex-1+currentImages.length)%currentImages.length;
updateLightbox();
}

loadGallery("Batik Daun",document.querySelector(".color-options button"));
</script>

</body>
</html>
