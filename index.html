<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Produk Selempang Wisuda</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
}
.container{
  max-width:1200px;
  margin:auto;
  background:white;
  padding:20px;
}
.product{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

/* IMAGE AREA */
.main-img{
  width:100%;
  border-radius:6px;
}
.thumb{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.thumb img{
  width:80px;
  border:2px solid #ddd;
  border-radius:4px;
  cursor:pointer;
}
.thumb img.active{
  border-color:#ee4d2d;
}

/* INFO AREA */
h1{
  font-size:22px;
  margin-bottom:10px;
}
.rating{
  color:#f5a623;
  margin-bottom:10px;
}
.price{
  color:#ee4d2d;
  font-size:28px;
  font-weight:bold;
  margin:15px 0;
}

.option-group{
  margin:15px 0;
}
.option-group span{
  display:block;
  margin-bottom:8px;
  font-weight:bold;
}
.options{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.options button{
  border:1px solid #ccc;
  background:white;
  padding:8px 12px;
  border-radius:4px;
  cursor:pointer;
}
.options button.active{
  border-color:#ee4d2d;
  color:#ee4d2d;
}

/* BUTTONS */
.actions{
  display:flex;
  gap:15px;
  margin-top:25px;
}
.cart{
  flex:1;
  background:white;
  border:1px solid #ee4d2d;
  color:#ee4d2d;
  padding:12px;
  border-radius:4px;
  font-size:16px;
  cursor:pointer;
}
.buy{
  flex:1;
  background:#ee4d2d;
  border:none;
  color:white;
  padding:12px;
  border-radius:4px;
  font-size:16px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
  .product{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="product">

    <!-- LEFT IMAGE -->
    <div>
      <img id="mainImage" src="images/Batik Daun/Batik Daun 1.webp" class="main-img">

      <div class="thumb">
        <img src="images/Batik Daun/Batik Daun 1.webp" class="active" onclick="changeImg(this)">
        <img src="images/Batik Daun/Batik Daun 2.webp" onclick="changeImg(this)">
        <img src="images/Batik Daun/Batik Daun 3.webp" onclick="changeImg(this)">
      </div>
    </div>

    <!-- RIGHT INFO -->
    <div>
      <h1>SELEMPANG WISUDA LEHER MOTIF BATIK DAUN</h1>

      <div class="rating">★★★★★ 5.0 | 13 Penilaian</div>

      <div class="price">Rp65.000</div>

      <div class="option-group">
        <span>Pilihan Model</span>
        <div class="options">
          <button class="active">Model 1</button>
          <button>Model 2</button>
          <button>Model 3</button>
          <button>Model 4</button>
          <button>Model 5</button>
          <button>Model 6</button>
          <button>Model 7</button>
          <button>Model 8</button>
          <button>Model 9</button>
          <button>Model PPG 1</button>
          <button>Model PPG 2</button>
          <button>Model Custom</button>
        </div>
      </div>

      <div class="option-group">
        <span>Warna + Tulisan</span>
        <div class="options">
          <button class="active">Maroon Gold</button>
          <button>Maroon Silver</button>
          <button>Hitam Gold</button>
          <button>Hitam Silver</button>
          <button>Navi Gold</button>
          <button>Navi Silver</button>
          <button>Warna Custom</button>
        </div>
      </div>

      <div class="actions">
        <button class="cart">🛒 Masukkan Keranjang</button>
        <button class="buy">Beli Sekarang</button>
      </div>

    </div>

  </div>
</div>

<script>
function changeImg(el){
  document.getElementById("mainImage").src = el.src;
  document.querySelectorAll(".thumb img").forEach(img=>{
    img.classList.remove("active");
  });
  el.classList.add("active");
}

// option active
document.querySelectorAll(".options button").forEach(btn=>{
  btn.addEventListener("click", function(){
    let parent = this.parentElement;
    parent.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
    this.classList.add("active");
  });
});
</script>

</body>
</html>
