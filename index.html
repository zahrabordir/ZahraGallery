<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Produk Selempang Wisuda</title>
<style>
body{
  font-family:Arial, sans-serif;
  margin:0;
  background:#f5f5f5;
}
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
  background:#fff;
  display:flex;
  gap:20px;
}
.left{
  width:50%;
}
.right{
  width:50%;
}

/* MAIN IMAGE */
.main-img{
  width:100%;
  border-radius:8px;
  overflow:hidden;
}
.main-img img{
  width:100%;
  display:block;
  transition:opacity .3s ease;
}
.fade-out{
  opacity:0;
}

/* MODEL OPTIONS */
.model-options{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:8px;
  margin-top:10px;
}
.model-options img{
  width:100%;
  cursor:pointer;
  border:2px solid transparent;
  border-radius:6px;
}
.model-options img.active{
  border-color:#ff5722;
}

/* INFO */
h1{
  font-size:20px;
  margin:0 0 10px;
}
.price{
  color:#ff5722;
  font-size:24px;
  font-weight:bold;
  margin:10px 0;
}
.color-options button{
  padding:8px 12px;
  margin:4px;
  border:1px solid #ccc;
  background:#fff;
  cursor:pointer;
}
.color-options button.active{
  border-color:#ff5722;
  background:#ffe7de;
}
.buy{
  margin-top:20px;
}
.buy button{
  padding:12px 20px;
  border:none;
  font-size:16px;
  cursor:pointer;
}
.cart{
  background:#fff;
  border:1px solid #ff5722;
  color:#ff5722;
}
.now{
  background:#ff5722;
  color:#fff;
}
</style>
</head>
<body>

<div class="container">
  <div class="left">
    <div class="main-img">
      <img id="mainImage" src="images/Model1.jpg">
    </div>

    <!-- MODEL THUMBNAIL -->
    <div class="model-options">
      <img src="images/Model1.jpg" onclick="selectModel(this)" class="active">
      <img src="images/Model2.jpg" onclick="selectModel(this)">
      <img src="images/Model3.jpg" onclick="selectModel(this)">
      <img src="images/Model4.jpg" onclick="selectModel(this)">
      <img src="images/Model5.jpg" onclick="selectModel(this)">
      <img src="images/Model6.jpg" onclick="selectModel(this)">
      <img src="images/Model7.jpg" onclick="selectModel(this)">
      <img src="images/Model8.jpg" onclick="selectModel(this)">
      <img src="images/Model9.jpg" onclick="selectModel(this)">
      <img src="images/Model PPG1.jpg" onclick="selectModel(this)">
      <img src="images/Model PPG2.jpg" onclick="selectModel(this)">
      <img src="images/Model PPG3.jpg" onclick="selectModel(this)">
    </div>
  </div>

  <div class="right">
    <h1>SELEMPANG WISUDA LEHER MOTIF BATIK DAUN</h1>

      <h3>Galeri</h3>
    <div class="color-options">
      <button class="active">Batik Daun</button>
      <button>Batik Flora</button>
      <button>Batik Kait</button>
      <button>Batik Klasik</button>
      <button>Batik Serat</button>
      <button>Batik Simpul</button>
    </div>

    <div class="buy">
      <button class="cart">Masukkan Keranjang</button>
      <button class="now">Beli Sekarang</button>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  window.selectModel = function(el){
    const main = document.getElementById("mainImage");

    document.querySelectorAll(".model-options img").forEach(img=>{
      img.classList.remove("active");
    });
    el.classList.add("active");

    main.classList.add("fade-out");
    setTimeout(()=>{
      main.src = el.src;
      main.classList.remove("fade-out");
    },200);
  }

  document.querySelectorAll(".color-options button").forEach(btn=>{
    btn.addEventListener("click", function(){
      document.querySelectorAll(".color-options button").forEach(b=>b.classList.remove("active"));
      this.classList.add("active");
    });
  });

});
</script>

</body>
</html>
