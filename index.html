<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Selempang Wisuda</title>
<style>
body{
  font-family:Arial, sans-serif;
  margin:0;
  background:#f5f5f5;
}
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
  background:#fff;
  display:flex;
  gap:20px;
}
.left{width:50%}
.right{width:50%}

/* MAIN IMAGE */
.main-img{
  width:100%;
  border-radius:8px;
  overflow:hidden;
}
.main-img img{
  width:100%;
  display:block;
  transition:opacity .3s ease;
}
.fade-out{opacity:0}

/* MODEL OPTIONS */
.model-options{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:8px;
  margin-top:10px;
}
.model-options img{
  width:100%;
  cursor:pointer;
  border:2px solid transparent;
  border-radius:6px;
}
.model-options img.active{
  border-color:#ff5722;
}

/* BATIK OPTIONS */
.color-options button{
  padding:8px 14px;
  margin:4px;
  border:1px solid #ccc;
  background:#fff;
  cursor:pointer;
}
.color-options button.active{
  border-color:#ff5722;
  background:#ffe7de;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-top:15px;
}
.gallery img{
  width:100%;
  border-radius:6px;
  cursor:pointer;
  transition:.2s;
}
.gallery img:hover{
  transform:scale(1.05);
}

/* INFO */
h1{font-size:20px;margin:0 0 10px}
.price{color:#ff5722;font-size:24px;font-weight:bold;margin:10px 0}
.buy{margin-top:20px}
.buy button{
  padding:12px 20px;
  border:none;
  font-size:16px;
  cursor:pointer;
}
.cart{background:#fff;border:1px solid #ff5722;color:#ff5722}
.now{background:#ff5722;color:#fff}
</style>
</head>
<body>

<div class="container">
  <div class="left">
    <div class="main-img">
      <img id="mainImage" src="images/Model1.jpg">
    </div>

    <!-- MODEL THUMB -->
    <div class="model-options">
      <img src="images/Model1.jpg" onclick="selectModel(this)" class="active">
      <img src="images/Model2.jpg" onclick="selectModel(this)">
      <img src="images/Model3.jpg" onclick="selectModel(this)">
      <img src="images/Model4.jpg" onclick="selectModel(this)">
      <img src="images/Model5.jpg" onclick="selectModel(this)">
      <img src="images/Model6.jpg" onclick="selectModel(this)">
      <img src="images/Model7.jpg" onclick="selectModel(this)">
      <img src="images/Model8.jpg" onclick="selectModel(this)">
      <img src="images/Model9.jpg" onclick="selectModel(this)">
    </div>
  </div>

  <div class="right">
    <h1>SELEMPANG WISUDA LEHER MOTIF BATIK DAUN</h1>
     <h3>Galeri</h3>
    <div class="color-options">
      <button class="active" onclick="loadGallery('Batik Daun',this)">Batik Daun</button>
      <button onclick="loadGallery('Batik Flora',this)">Batik Flora</button>
      <button onclick="loadGallery('Batik Kait',this)">Batik Kait</button>
      <button onclick="loadGallery('Batik Klasik',this)">Batik Klasik</button>
      <button onclick="loadGallery('Batik Serat',this)">Batik Serat</button>
      <button onclick="loadGallery('Batik Simpul',this)">Batik Simpul</button>
    </div>

    <div class="gallery" id="gallery"></div>

      </div>
</div>

<script>
const imageCount = 3; // ubah sesuai jumlah foto per folder

function selectModel(el){
  const main = document.getElementById("mainImage");

  document.querySelectorAll(".model-options img").forEach(img=>{
    img.classList.remove("active");
  });
  el.classList.add("active");

  main.classList.add("fade-out");
  setTimeout(()=>{
    main.src = el.src;
    main.classList.remove("fade-out");
  },200);
}

function loadGallery(folder, btn){
  document.querySelectorAll(".color-options button").forEach(b=>{
    b.classList.remove("active");
  });
  btn.classList.add("active");

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  for(let i=1;i<=imageCount;i++){
    const img = document.createElement("img");
    img.src = `images/${folder}/${folder} ${i}.webp`;
    img.onclick = ()=>changeMainImage(img.src);
    gallery.appendChild(img);
  }
}

function changeMainImage(src){
  const main = document.getElementById("mainImage");
  main.classList.add("fade-out");
  setTimeout(()=>{
    main.src = src;
    main.classList.remove("fade-out");
  },200);
}

/* default load */
loadGallery("Batik Daun", document.querySelector(".color-options button"));
</script>

</body>
</html>
