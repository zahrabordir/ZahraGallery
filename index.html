<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Selempang Wisuda</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.container{max-width:1100px;margin:auto;padding:20px;background:#fff;display:flex;gap:20px}
.left,.right{width:50%}

/* MOBILE */
@media(max-width:768px){
  .container{flex-direction:column}
  .left,.right{width:100%}

  .left{order:1}
  .right{order:2}
  .model-box{order:3}
}

/* MAIN IMAGE */
.main-img img{width:100%;border-radius:8px;cursor:zoom-in}

/* MODEL */
.model-box{margin-top:15px}
.toggleModel{
  background:#ff5722;
  color:white;
  border:none;
  padding:10px;
  width:100%;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}
.model-options{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
  gap:8px;
  margin-top:10px;
  overflow:hidden;
  transition:max-height .4s ease, opacity .3s ease;
}
.model-options img{
  width:100%;
  cursor:pointer;
  border:2px solid transparent;
  border-radius:6px
}
.model-options img.active{border-color:#ff5722}

/* default hidden (mobile) */
.model-options.hide{
  max-height:0;
  opacity:0;
  pointer-events:none;
}
.model-options.show{
  max-height:1000px;
  opacity:1;
}

/* BATIK */
.color-options button{
  padding:8px 14px;margin:4px;
  border:1px solid #ccc;
  background:#fff;cursor:pointer
}
.color-options button.active{
  border-color:#ff5722;
  background:#ffe7de
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;margin-top:15px
}
.gallery img{
  width:100%;
  border-radius:6px;
  cursor:pointer
}

/* LIGHTBOX */
#lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  justify-content:center;
  align-items:center;
  z-index:999
}
#lightbox img{max-width:90%;max-height:90%}
.closeBtn{
  position:absolute;top:15px;right:15px;
  width:26px;height:26px;
  background:black;color:white;
  border-radius:50%;
  text-align:center;line-height:26px;
  cursor:pointer;font-size:14px
}
.navBtn{
  position:absolute;top:50%;
  transform:translateY(-50%);
  font-size:40px;color:white;
  cursor:pointer;opacity:.2
}
.navBtn:hover{opacity:.8}
#prev{left:15px}
#next{right:15px}
#indicator{position:absolute;bottom:20px;color:white}
</style>
</head>
<body>

<div class="container">
<div class="left">
<div class="main-img">
<img id="mainImage" src="images/Model1.jpg" onclick="openLightbox()">
</div>

<div class="model-box">
<button class="toggleModel" onclick="toggleModel()">Tampilkan Model ▼</button>
<div class="model-options hide" id="modelList"></div>
</div>
</div>

<div class="right">
<h1>SELEMPANG WISUDA LEHER MOTIF BATIK DAUN</h1>

<h3>Galeri</h3>
<div class="color-options">
<button class="active" onclick="loadGallery('Batik Daun',this)">Batik Daun</button>
<button onclick="loadGallery('Batik Flora',this)">Batik Flora</button>
<button onclick="loadGallery('Batik Kait',this)">Batik Kait</button>
<button onclick="loadGallery('Batik Klasik',this)">Batik Klasik</button>
<button onclick="loadGallery('Batik Serat',this)">Batik Serat</button>
<button onclick="loadGallery('Batik Simpul',this)">Batik Simpul</button>
</div>

<div class="gallery" id="gallery"></div>
</div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
<div class="closeBtn" onclick="closeLightbox()">✕</div>
<div id="prev" class="navBtn" onclick="prevImg()">❮</div>
<img id="lightImg">
<div id="next" class="navBtn" onclick="nextImg()">❯</div>
<div id="indicator"></div>
</div>

<script>
let currentImages=[];
let currentIndex=0;

/* TOGGLE MODEL */
function toggleModel(){
const box=document.getElementById("modelList");
const btn=document.querySelector(".toggleModel");
if(box.classList.contains("hide")){
  box.classList.remove("hide");
  box.classList.add("show");
  btn.innerHTML="Sembunyikan Model ▲";
}else{
  box.classList.add("hide");
  box.classList.remove("show");
  btn.innerHTML="Tampilkan Model ▼";
}
}

/* LOAD MODEL AUTO */
const modelList=document.getElementById("modelList");
let m=1, missModel=0;
function loadModels(){
  let src=`images/Model${m}.jpg`;
  let img=new Image();
  img.src=src;

  img.onload=()=>{
    missModel=0;
    let thumb=document.createElement("img");
    thumb.src=src;
    thumb.loading="lazy";
    thumb.onclick=()=>selectModel(thumb);
    if(m===1) thumb.classList.add("active");
    modelList.appendChild(thumb);
    m++; loadModels();
  };

  img.onerror=()=>{
    missModel++; m++;
    if(missModel<5) loadModels();
  };
}
loadModels();

/* pilih model */
function selectModel(el){
document.querySelectorAll(".model-options img").forEach(i=>i.classList.remove("active"));
el.classList.add("active");
currentImages=[el.src];
currentIndex=0;
document.getElementById("mainImage").src=el.src;
}

/* GALERI AUTO */
function loadGallery(folder,btn){
document.querySelectorAll(".color-options button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

const gallery=document.getElementById("gallery");
gallery.innerHTML="";
currentImages=[];

let i=1, miss=0;
const maxMiss=6;

function tryLoad(){
let src=`images/${folder}/${folder} ${i}.webp`;
let img=new Image();
img.src=src;

img.onload=()=>{
  miss=0;
  currentImages.push(src);
  let thumb=document.createElement("img");
  thumb.src=src;
  thumb.loading="lazy";
  thumb.onclick=()=>{
    currentIndex=currentImages.indexOf(src);
    document.getElementById("mainImage").src=src;
  };
  gallery.appendChild(thumb);
  i++; tryLoad();
};

img.onerror=()=>{
  miss++; i++;
  if(miss<maxMiss) tryLoad();
};
}
tryLoad();
}

/* LIGHTBOX */
function openLightbox(){
if(currentImages.length===0){
currentImages=[document.getElementById("mainImage").src];
currentIndex=0;
}
document.getElementById("lightbox").style.display="flex";
updateLightbox();
}
function closeLightbox(){
document.getElementById("lightbox").style.display="none";
}
function updateLightbox(){
document.getElementById("lightImg").src=currentImages[currentIndex];
document.getElementById("indicator").innerText=`${currentIndex+1} / ${currentImages.length}`;
}
function nextImg(){
currentIndex=(currentIndex+1)%currentImages.length;
updateLightbox();
}
function prevImg(){
currentIndex=(currentIndex-1+currentImages.length)%currentImages.length;
updateLightbox();
}

/* default */
loadGallery("Batik Daun",document.querySelector(".color-options button"));
</script>

</body>
</html>
