<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Galeri Produk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial;background:#f2f2f2}
header{
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;padding:50px 20px;text-align:center
}
.container{max-width:1200px;margin:auto;padding:30px 15px}
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px
}
.card{
  background:white;border-radius:12px;
  overflow:hidden;box-shadow:0 3px 8px rgba(0,0,0,.2);
  text-align:center
}
.card img{
  width:100%;height:230px;object-fit:cover;cursor:pointer
}
.subgaleri-link{
  display:block;margin:10px 0;
  color:#2575fc;font-weight:bold;text-decoration:none
}

/* SUB GALERI */
.subgaleri{text-align:center;margin-top:60px}
.subgaleri img{
  width:320px;max-width:90%;
  border-radius:12px;cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,.3)
}

/* MODAL */
#imgModal{
  display:none;position:fixed;z-index:999;
  left:0;top:0;width:100%;height:100%;
  background:rgba(0,0,0,.85);
  justify-content:center;align-items:center;
  flex-direction:column
}
#imgModal img{
  max-width:90%;max-height:80%;border-radius:10px
}
.modal-btn{
  background:#ffcc00;border:none;
  padding:10px 18px;margin:10px;
  border-radius:20px;font-weight:bold;
  cursor:pointer
}
.close{
  position:absolute;top:20px;right:30px;
  font-size:40px;color:white;cursor:pointer
}
</style>
</head>

<body>

<header>
<h1>Selempang Wisuda Custom</h1>
<p>Galeri Motif Bordir</p>
</header>

<div class="container">

<div class="gallery">
  <div class="card">
    <img src="images/Zahra Frame-1.jpg">
    <h3>Batik Daun</h3>
    <a href="#galeri1" class="subgaleri-link">Lihat Galeri</a>
  </div>
  <div class="card">
    <img src="images/Zahra Frame-2.jpg">
    <h3>Batik Flora</h3>
    <a href="#galeri2" class="subgaleri-link">Lihat Galeri</a>
  </div>
  <div class="card">
    <img src="images/Zahra Frame-3.jpg">
    <h3>Batik Kait</h3>
    <a href="#galeri3" class="subgaleri-link">Lihat Galeri</a>
  </div>
  <div class="card">
    <img src="images/Zahra Frame-4.jpg">
    <h3>Batik Klasik</h3>
    <a href="#galeri4" class="subgaleri-link">Lihat Galeri</a>
  </div>
  <div class="card">
    <img src="images/Zahra Frame-5.jpg">
    <h3>Batik Serat</h3>
    <a href="#galeri5" class="subgaleri-link">Lihat Galeri</a>
  </div>
  <div class="card">
    <img src="images/Zahra Frame-6.jpg">
    <h3>Batik Simpul</h3>
    <a href="#galeri6" class="subgaleri-link">Lihat Galeri</a>
  </div>
</div>

<!-- SUB GALERI -->
<div id="galeri1" class="subgaleri">
<h2>Batik Daun</h2>
<img src="images/Batik Daun/Batik Daun 1.webp" onclick="openGallery(1,0)">
</div>

<div id="galeri2" class="subgaleri">
<h2>Batik Flora</h2>
<img src="images/Batik Flora/Batik Flora 1.webp" onclick="openGallery(2,0)">
</div>

<div id="galeri3" class="subgaleri">
<h2>Batik Kait</h2>
<img src="images/Batik Kait/Batik Kait 1.webp" onclick="openGallery(3,0)">
</div>

<div id="galeri4" class="subgaleri">
<h2>Batik Klasik</h2>
<img src="images/Batik Klasik/Batik Klasik 1.webp" onclick="openGallery(4,0)">
</div>

<div id="galeri5" class="subgaleri">
<h2>Batik Serat</h2>
<img src="images/Batik Serat/Batik Serat 1.webp" onclick="openGallery(5,0)">
</div>

<div id="galeri6" class="subgaleri">
<h2>Batik Simpul</h2>
<img src="images/Batik Simpul/Batik Simpul 1.webp" onclick="openGallery(6,0)">
</div>

</div>

<!-- MODAL -->
<div id="imgModal">
  <span class="close" onclick="closeImg()">&times;</span>
  <img id="modalImg">
  <div>
    <button class="modal-btn" onclick="prev()">Prev</button>
    <button class="modal-btn" onclick="next()">Next</button>
  </div>
</div>

<script>
let galleries = {
  1:["images/Batik Daun/Batik Daun 1.webp","images/Batik Daun/Batik Daun 2.webp","images/Batik Daun/Batik Daun 3.webp"],
  2:["images/Batik Flora/Batik Flora 1.webp","images/Batik Flora/Batik Flora 2.webp","images/Batik Flora/Batik Flora 3.webp"],
  3:["images/Batik Kait/Batik Kait 1.webp","images/Batik Kait/Batik Kait 2.webp","images/Batik Kait 3.webp"],
  4:["images/Batik Klasik/Batik Klasik 1.webp","images/Batik Klasik/Batik Klasik 2.webp","images/Batik Klasik/Batik Klasik 3.webp"],
  5:["images/Batik Serat/Batik Serat 1.webp","images/Batik Serat/Batik Serat 2.webp","images/Batik Serat/Batik Serat 3.webp"],
  6:["images/Batik Simpul/Batik Simpul 1.webp","images/Batik Simpul/Batik Simpul 2.webp","images/Batik Simpul/Batik Simpul 3.webp"]
};

let currentGallery = 1;
let currentIndex = 0;

function openGallery(g,i){
  currentGallery = g;
  currentIndex = i;
  document.getElementById("modalImg").src = galleries[g][i];
  document.getElementById("imgModal").style.display="flex";
}

function next(){
  currentIndex++;
  if(currentIndex >= galleries[currentGallery].length) currentIndex = 0;
  document.getElementById("modalImg").src = galleries[currentGallery][currentIndex];
}
function prev(){
  currentIndex--;
  if(currentIndex < 0) currentIndex = galleries[currentGallery].length-1;
  document.getElementById("modalImg").src = galleries[currentGallery][currentIndex];
}

function closeImg(){
  document.getElementById("imgModal").style.display="none";
}
</script>

</body>
</html>
